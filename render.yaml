# Render Blueprint — https://render.com
# Connect this repo, then add secret env vars in the dashboard (see DEPLOY.md).

services:
  - type: web
    name: good-people-posting
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: ADMIN_NOTIFY_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: SITE_NAME
        value: Good People Posting
