<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Editor</title>

    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/editor.css">

</head>
<body>
    <!-- Navigation removed per design -->

    <!-- Editor Container -->
    <div class="editor-container">
        <div class="editor-header">
            <input type="text" class="title-input" placeholder="Blog title...">
            <div class="editor-toolbar">
                <button class="toolbar-btn" data-action="bold" title="Bold">B</button>
                <button class="toolbar-btn" data-action="italic" title="Italic">I</button>
                <button class="toolbar-btn" data-action="strikethrough" title="Strikethrough">S</button>
                <button class="toolbar-btn" data-action="underline" title="Underline">U</button>
                <button class="toolbar-btn" data-action="heading" title="Heading">H</button>
                <input type="file" accept="image/*" id="image-upload" hidden>
                <button class="toolbar-btn" data-action="image" title="Insert Image">📷</button>
                <span class="autosave-status" id="autosave-status">Ready</span>
            </div>
        </div>
        
        <div class="editor-content">
            <textarea class="article-editor" placeholder="#IKFLY"></textarea>
        </div>

        <div class="editor-footer">
            <div class="footer-left">
                <button class="btn dark publish-btn">Publish</button>
                <button class="btn grey save-draft-btn">Save Draft</button>
            </div>
            <div class="footer-right">
                <a href="/admin" class="btn grey">Dashboard</a>
                <a href="/" class="btn grey">Home</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.9.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.9.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.9.1/firebase-auth.js"></script>

    <script src="../js/firebase.js"></script>
    <script src="../js/editor.js"></script>


</body>
</html>
